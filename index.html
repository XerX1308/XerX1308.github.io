<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Signal</title>
  <meta name="description" content="Signal.">
  <meta property="og:title" content="Signal">
  <meta property="og:description" content="Signal.">
  <style>
    :root {
      --bg: #080a07;
      --bg-soft: #10140e;
      --ink: #eff2e7;
      --signal: #d9ff3f;
      --red: #ef332e;
      --red-dark: #941e24;
      --line: rgba(239, 242, 231, 0.12);
      --line-strong: rgba(239, 242, 231, 0.24);
    }

    * {
      box-sizing: border-box;
    }

    html {
      min-height: 100%;
      scrollbar-color: rgba(239, 51, 46, 0.7) #050604;
      scrollbar-width: thin;
    }

    body {
      min-height: 100%;
      margin: 0;
      color: var(--ink);
      overflow-y: auto;
      overflow-x: hidden;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      letter-spacing: 0;
      background:
        linear-gradient(180deg, rgba(239, 51, 46, 0.045), transparent 30rem),
        radial-gradient(circle at 18% 53%, rgba(217, 255, 63, 0.055), transparent 22rem),
        linear-gradient(135deg, #12160f 0%, var(--bg) 58%, #050604 100%);
    }

    ::-webkit-scrollbar {
      width: 12px;
    }

    ::-webkit-scrollbar-track {
      background: #050604;
      border-left: 1px solid rgba(239, 242, 231, 0.08);
    }

    ::-webkit-scrollbar-thumb {
      background: linear-gradient(180deg, rgba(239, 51, 46, 0.82), rgba(112, 28, 30, 0.55));
      border: 4px solid #050604;
      border-radius: 999px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: linear-gradient(180deg, rgba(255, 75, 68, 0.95), rgba(155, 35, 39, 0.72));
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0.2;
      background:
        linear-gradient(90deg, rgba(239, 242, 231, 0.05) 1px, transparent 1px),
        linear-gradient(180deg, rgba(239, 242, 231, 0.032) 1px, transparent 1px);
      background-size: 72px 72px;
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background: repeating-linear-gradient(
        180deg,
        rgba(239, 242, 231, 0.026) 0,
        rgba(239, 242, 231, 0.026) 1px,
        transparent 1px,
        transparent 8px
      );
      opacity: 0.26;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    img {
      display: block;
      max-width: 100%;
    }

    .site {
      position: relative;
      z-index: 1;
      min-height: 100svh;
      padding: clamp(22px, 4vw, 46px);
    }

    .masthead {
      position: fixed;
      z-index: 5;
      top: clamp(22px, 4vw, 46px);
      left: clamp(22px, 4vw, 46px);
    }

    .identity {
      display: inline-flex;
      align-items: center;
      gap: 12px;
    }

    .logo-eye {
      width: clamp(62px, 7vw, 92px);
      height: auto;
      display: block;
      overflow: visible;
      filter: drop-shadow(0 0 18px rgba(239, 51, 46, 0.12));
    }

    .pupil-group {
      transition: transform 130ms ease-out;
      transform-box: fill-box;
      transform-origin: center;
    }

    .wordmark {
      margin: 0;
      color: var(--ink);
      font-size: clamp(1.35rem, 3.1vw, 2.8rem);
      line-height: 0.92;
      font-weight: 900;
      letter-spacing: 0;
    }

    .library {
      min-height: 100svh;
      display: flex;
      align-items: center;
      justify-content: flex-start;
      padding: clamp(108px, 15vh, 150px) clamp(16px, 7vw, 92px) clamp(42px, 8vh, 74px);
    }

    .games-grid {
      width: min(690px, 100%);
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: clamp(18px, 2.6vw, 34px);
      align-items: start;
    }

    .game-card {
      position: relative;
      display: block;
      aspect-ratio: 3 / 4;
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
      background: #050604;
      box-shadow: 0 20px 70px rgba(0, 0, 0, 0.34);
      transition: border-color 180ms ease, box-shadow 180ms ease, transform 180ms ease, opacity 180ms ease;
      isolation: isolate;
    }

    .game-card::after {
      content: "";
      position: absolute;
      inset: 0;
      z-index: 2;
      pointer-events: none;
      background:
        linear-gradient(180deg, transparent 48%, rgba(0, 0, 0, 0.18)),
        repeating-linear-gradient(180deg, rgba(239, 242, 231, 0.035) 0 1px, transparent 1px 7px);
      opacity: 0.42;
      transition: opacity 180ms ease;
    }

    .game-card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: saturate(0.9) contrast(1.07) brightness(0.86);
      transition: transform 240ms ease, filter 180ms ease;
    }

    .game-card:hover,
    .game-card:focus-visible {
      outline: none;
      border-color: var(--line-strong);
      box-shadow: 0 24px 84px rgba(0, 0, 0, 0.44), 0 0 28px rgba(239, 51, 46, 0.09);
      transform: translateY(-3px);
    }

    .game-card:hover::after,
    .game-card:focus-visible::after {
      opacity: 0.24;
    }

    .game-card:hover img,
    .game-card:focus-visible img {
      transform: scale(1.025);
      filter: saturate(1) contrast(1.1) brightness(0.94);
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    @media (max-width: 820px) {
      .masthead {
        position: relative;
        top: auto;
        left: auto;
      }

      .site {
        padding: 22px;
      }

      .library {
        min-height: auto;
        padding: 72px 0 40px;
      }

      .games-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
        width: min(500px, 100%);
      }
    }

    @media (max-width: 520px) {
      .games-grid {
        grid-template-columns: 1fr;
        width: min(230px, 72vw);
      }
    }
  </style>
</head>
<body>
  <main class="site">
    <header class="masthead">
      <a class="identity" href="./" aria-label="Signal">
        <svg class="logo-eye" viewBox="0 0 180 96" role="img" aria-hidden="true">
          <path d="M10 48C33 14 68 6 90 6s57 8 80 42c-23 34-58 42-80 42S33 82 10 48Z" fill="#f0322d"/>
          <path d="M19 48C43 24 71 17 90 17s47 7 71 31c-24 24-52 31-71 31S43 72 19 48Z" fill="#9b2028" opacity="0.74"/>
          <path d="M10 48C33 14 68 6 90 6s57 8 80 42" fill="none" stroke="#ff4038" stroke-width="4" stroke-linecap="round"/>
          <path d="M10 48c23 34 58 42 80 42s57-8 80-42" fill="none" stroke="#ef332e" stroke-width="4" stroke-linecap="round"/>
          <g class="pupil-group">
            <ellipse cx="90" cy="49" rx="24" ry="30" fill="#060706"/>
            <circle cx="90" cy="33" r="15" fill="#ef332e"/>
          </g>
        </svg>
        <h1 class="wordmark">Signal</h1>
      </a>
    </header>

    <section class="library" aria-label="Games">
      <div class="games-grid">
        <a class="game-card" href="./capital.html" aria-label="Capital">
          <img src="./assets/capital-cover.png" alt="">
          <span class="sr-only">Capital</span>
        </a>
      </div>
    </section>
  </main>

  <script>
    const eye = document.querySelector('.logo-eye');
    const pupil = document.querySelector('.pupil-group');

    function movePupil(event) {
      if (!eye || !pupil) return;
      const rect = eye.getBoundingClientRect();
      const cx = rect.left + rect.width / 2;
      const cy = rect.top + rect.height / 2;
      const dx = Math.max(-8, Math.min(8, ((event.clientX - cx) / rect.width) * 22));
      const dy = Math.max(-5, Math.min(5, ((event.clientY - cy) / rect.height) * 14));
      pupil.style.transform = `translate(${dx}px, ${dy}px)`;
    }

    function resetPupil() {
      if (pupil) pupil.style.transform = 'translate(0, 0)';
    }

    window.addEventListener('pointermove', movePupil, { passive: true });
    window.addEventListener('pointerleave', resetPupil, { passive: true });
  </script>
</body>
</html>
